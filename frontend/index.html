        <h1>AIveilix — Persistent Knowledge Infrastructure for AI</h1>
        <p><strong>Upload your documents once and use them inside every AI</strong> — Claude, ChatGPT, or any MCP-compatible assistant — without ever re-uploading. AIveilix turns your files into a permanent, private, searchable knowledge base that any AI can read in real time through a single secure link.</p>
        <h2>How it works</h2>
        <ol>
          <li>Upload your files into a private <em>bucket</em> (your personal knowledge vault).</li>
          <li>AIveilix reads the text and the visuals — charts, diagrams, and text inside images.</li>
          <li>Each bucket gets its own MCP URL. Paste it into Claude, ChatGPT, or any MCP-compatible AI.</li>
          <li>Your AI answers from your real documents, cited to the page, in every session — no re-uploading.</li>
        </ol>
        <h2>Why MCP instead of re-uploading</h2>
        <p>Pasting a document into a chat burns tokens and is forgotten when the chat resets. AIveilix retrieves only the few most relevant passages per question — massive token savings, deeper understanding, and knowledge that never disappears.</p>
        <h2>Built-in AI agent</h2>
        <p>Smart filtering and citations, conversation threads, web search, and voice input.</p>
        <h2>Security &amp; privacy</h2>
        <p>Private, isolated buckets. Your data is never sold and never used to train AI. Encrypted in transit (TLS) and at rest, access-controlled, with token-protected MCP links you alone control and can revoke. AIveilix runs on enterprise infrastructure — Cloudflare (storage), Google Cloud (hosting and AI processing), and Stripe (payments) — whose providers hold independent SOC 2 / ISO 27001 certifications. Content sent to our AI provider is contractually not used to train any model. A GDPR Data Processing Agreement is available on request. Full detail: <a href="https://aiveilix.com/security">aiveilix.com/security</a>.</p>
        <h2>About</h2>
        <p>AIveilix is an independent software startup based in Nagoya, Japan, founded in 2026. More at <a href="https://aiveilix.com/about">aiveilix.com/about</a>. Contact: <a href="mailto:contact@aiveilix.com">contact@aiveilix.com</a>.</p>
